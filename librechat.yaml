version: "1.2"
cache: true
endpoints:
  custom:
    - name: "Claude-Share"
      apiKey: "${CLAUDE_PROXY_KEY}"
      baseURL: "https://claude-api.onlychats.site/v1/messages"
      models:
        default: ["sonnet"]
      titleConvo: false
      modelDisplayLabel: "Claude"
      directEndpoint: true
      customParams:
        defaultParamsEndpoint: "anthropic"
      addParams:
        stream: false
      dropParams: ["stop", "user", "frequency_penalty", "presence_penalty"]
